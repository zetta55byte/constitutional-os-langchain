<svg width="980" height="520" viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="980" height="520" fill="#0b1020"/>

  <!-- Title -->
  <text x="490" y="40" fill="#ffffff" font-size="22" font-family="Segoe UI" text-anchor="middle">
    Governed Agent Runtime (Plan → Action → Delta)
  </text>

  <!-- Agent box -->
  <rect x="60" y="120" width="220" height="280" rx="10" ry="10" fill="#141a33" stroke="#4f6fff" stroke-width="1.5"/>
  <text x="170" y="150" fill="#ffffff" font-size="16" font-family="Segoe UI" text-anchor="middle">
    Agent Runtime
  </text>
  <text x="170" y="170" fill="#9fa8ff" font-size="12" font-family="Segoe UI" text-anchor="middle">
    (Claude / OpenAI / Vercel / AutoGen)
  </text>

  <rect x="80" y="200" width="180" height="40" rx="6" ry="6" fill="#1f2744" stroke="#4f6fff" stroke-width="1"/>
  <text x="170" y="225" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">
    Plan (propose_plan)
  </text>

  <rect x="80" y="260" width="180" height="40" rx="6" ry="6" fill="#1f2744" stroke="#4f6fff" stroke-width="1"/>
  <text x="170" y="285" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">
    Action (propose_action)
  </text>

  <rect x="80" y="320" width="180" height="40" rx="6" ry="6" fill="#1f2744" stroke="#4f6fff" stroke-width="1"/>
  <text x="170" y="345" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">
    Delta (propose_delta)
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9fa8ff"/>
    </marker>
  </defs>

  <line x1="260" y1="220" x2="380" y2="220" stroke="#9fa8ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="280" x2="380" y2="280" stroke="#9fa8ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="340" x2="380" y2="340" stroke="#9fa8ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Membrane Stack -->
  <rect x="380" y="120" width="240" height="280" rx="10" ry="10" fill="#141a33" stroke="#ffb347" stroke-width="1.5"/>
  <text x="500" y="150" fill="#ffffff" font-size="16" font-family="Segoe UI" text-anchor="middle">
    Membrane Stack (M1–M4)
  </text>

  <rect x="400" y="190" width="200" height="32" rx="6" ry="6" fill="#1f2744" stroke="#ffb347" stroke-width="1"/>
  <text x="500" y="210" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">M1 — Safety</text>

  <rect x="400" y="230" width="200" height="32" rx="6" ry="6" fill="#1f2744" stroke="#ffb347" stroke-width="1"/>
  <text x="500" y="250" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">M2 — Reversibility</text>

  <rect x="400" y="270" width="200" height="32" rx="6" ry="6" fill="#1f2744" stroke="#ffb347" stroke-width="1"/>
  <text x="500" y="290" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">M3 — Pluralism</text>

  <rect x="400" y="310" width="200" height="32" rx="6" ry="6" fill="#1f2744" stroke="#ffb347" stroke-width="1"/>
  <text x="500" y="330" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">M4 — Human Primacy</text>

  <line x1="620" y1="220" x2="760" y2="220" stroke="#9fa8ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="280" x2="760" y2="280" stroke="#9fa8ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="340" x2="760" y2="340" stroke="#9fa8ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Governance API -->
  <rect x="760" y="120" width="180" height="180" rx="10" ry="10" fill="#141a33" stroke="#4fdf9f" stroke-width="1.5"/>
  <text x="850" y="150" fill="#ffffff" font-size="16" font-family="Segoe UI" text-anchor="middle">Governance API</text>
  <text x="850" y="170" fill="#9feccc" font-size="12" font-family="Segoe UI" text-anchor="middle">/governance/check</text>

  <rect x="780" y="190" width="140" height="32" rx="6" ry="6" fill="#1f2744" stroke="#4fdf9f" stroke-width="1"/>
  <text x="850" y="210" fill="#ffffff" font-size="11" font-family="Segoe UI" text-anchor="middle">Evaluate Plan/Action/Delta</text>

  <rect x="780" y="230" width="140" height="32" rx="6" ry="6" fill="#1f2744" stroke="#4fdf9f" stroke-width="1"/>
  <text x="850" y="250" fill="#ffffff" font-size="13" font-family="Segoe UI" text-anchor="middle">Allow / Block / Defer</text>

  <!-- Continuity Chain -->
  <rect x="760" y="320" width="180" height="120" rx="10" ry="10" fill="#141a33" stroke="#9feccc" stroke-width="1.5"/>
  <text x="850" y="345" fill="#ffffff" font-size="15" font-family="Segoe UI" text-anchor="middle">Continuity Chain</text>
  <text x="850" y="365" fill="#9feccc" font-size="12" font-family="Segoe UI" text-anchor="middle">Reversible Deltas · Audit Log</text>
  <text x="850" y="385" fill="#9feccc" font-size="12" font-family="Segoe UI" text-anchor="middle">"Govern deltas, not thoughts."</text>

  <!-- Return arrows -->
  <line x1="760" y1="220" x2="380" y2="220" stroke="#4fdf9f" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <line x1="760" y1="280" x2="380" y2="280" stroke="#4fdf9f" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <line x1="760" y1="340" x2="260" y2="340" stroke="#4fdf9f" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Tools box -->
  <rect x="60" y="430" width="220" height="60" rx="10" ry="10" fill="#141a33" stroke="#aaaaaa" stroke-width="1.2"/>
  <text x="170" y="455" fill="#ffffff" font-size="14" font-family="Segoe UI" text-anchor="middle">Tools / Environment</text>
  <text x="170" y="475" fill="#cccccc" font-size="11" font-family="Segoe UI" text-anchor="middle">DB · APIs · Files · External Systems</text>

  <line x1="170" y1="360" x2="170" y2="430" stroke="#9feccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Caption -->
  <text x="490" y="500" fill="#9fa8ff" font-size="12" font-family="Segoe UI" text-anchor="middle">
    Every plan, action, and delta is governed by M1–M4 and logged to the continuity chain before tools execute.
  </text>
</svg>
